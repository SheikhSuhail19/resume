name: Build Resume PDF

on:
  push:
    branches: [main]
    paths:
      - '**.tex'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: SheikhSuhailKhursheed-3YoE.tex

      - name: Commit PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f SheikhSuhailKhursheed-3YoE.pdf
          git diff --cached --quiet || git commit -m "chore: auto-generate PDF from latest .tex"
          git push
